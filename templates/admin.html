<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 · 완산제검도관</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}

.topbar{background:#1a1a1a;padding:.875rem 1.25rem;display:flex;justify-content:space-between;align-items:center}
.topbar-title{color:#fff;font-size:15px;font-weight:700}
.btn-logout{background:none;border:1px solid #444;color:#aaa;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.btn-logout:hover{border-color:#888;color:#fff}

.container{max-width:720px;margin:0 auto;padding:1.25rem}

/* 로그인 */
.login-wrap{min-height:80vh;display:flex;align-items:center;justify-content:center}
.login-card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:340px;border:1px solid #e8e6e0}
.login-title{font-size:18px;font-weight:700;margin-bottom:1.5rem;text-align:center}
.field{margin-bottom:.875rem}
.field label{display:block;font-size:13px;color:#666;margin-bottom:5px;font-weight:500}
.field input,.field textarea,.field select{
  width:100%;padding:11px 13px;font-size:14px;
  border:1.5px solid #e0ddd6;border-radius:9px;
  background:#fff;color:#1a1a1a;
  font-family:'Noto Sans KR',sans-serif;
  transition:border-color .15s;outline:none;
  -webkit-appearance:none;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#1a1a1a}
.field textarea{resize:vertical;min-height:80px;line-height:1.6}

.btn-primary{
  width:100%;padding:12px;background:#1a1a1a;color:#fff;
  border:none;border-radius:9px;font-size:14px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .15s;
}
.btn-primary:hover{opacity:.85}
.btn-sm{
  padding:7px 14px;background:#1a1a1a;color:#fff;
  border:none;border-radius:7px;font-size:13px;font-weight:500;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .15s;
  white-space:nowrap;
}
.btn-sm:hover{opacity:.8}
.btn-outline{
  padding:7px 14px;background:#fff;color:#1a1a1a;
  border:1.5px solid #e0ddd6;border-radius:7px;font-size:13px;font-weight:500;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.btn-outline:hover{border-color:#aaa}
.btn-danger{
  padding:5px 10px;background:#fff;color:#dc2626;
  border:1px solid #fca5a5;border-radius:6px;font-size:12px;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
}
.btn-danger:hover{background:#fef2f2}

.card{background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:1rem;border:1px solid #e8e6e0}
.section-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#888;margin-bottom:1rem;font-weight:500}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.625rem;margin-bottom:1rem}
.stat-card{background:#fff;border-radius:12px;padding:1rem;text-align:center;border:1px solid #e8e6e0}
.stat-num{font-size:22px;font-weight:700}
.stat-lbl{font-size:11px;color:#888;margin-top:2px}

.tab-bar{display:flex;gap:4px;background:#f5f4f0;border-radius:10px;padding:4px;margin-bottom:1rem}
.tab{flex:1;padding:8px;text-align:center;border:none;background:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:#666;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.tab.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.08)}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-weight:500;color:#888;border-bottom:1px solid #f0ede6;font-size:12px;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #f5f4f0;color:#1a1a1a;vertical-align:middle}
tr:last-child td{border-bottom:none}

.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-individual{background:#f0f0ee;color:#555}
.badge-team{background:#f0fdf4;color:#15803d}
.badge-both{background:#eff6ff;color:#1d4ed8}

.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.team-card{background:#f5f4f0;border-radius:10px;padding:1rem}
.team-title{font-size:12px;font-weight:700;color:#888;margin-bottom:.625rem}
.team-member{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #e8e6e0}
.team-member:last-child{border-bottom:none}
.member-avatar{width:28px;height:28px;border-radius:50%;background:#1a1a1a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.member-name{font-size:13px;font-weight:500}
.member-rank{font-size:11px;color:#999}

.ai-badge{display:inline-flex;align-items:center;gap:5px;background:#f5f0ff;border:1px solid #d8b4fe;border-radius:6px;padding:3px 8px;font-size:11px;color:#7c3aed;margin-left:8px}

.upload-zone{
  border:2px dashed #e0ddd6;border-radius:10px;
  padding:1.5rem;text-align:center;cursor:pointer;
  color:#aaa;font-size:13px;transition:border-color .15s;
  background:#fafaf8;
}
.upload-zone:hover{border-color:#aaa}
.upload-zone.has-file{border-color:#86efac;background:#f0fdf4;color:#15803d}

.parsed-result{background:#f5f4f0;border-radius:10px;padding:1rem;margin-top:.75rem;display:none}
.parsed-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #ebe8e0}
.parsed-row:last-child{border-bottom:none}
.parsed-key{color:#888}
.parsed-val{font-weight:500;color:#1a1a1a;text-align:right;max-width:65%}

.error-text{color:#dc2626;font-size:13px;margin-top:.5rem}
.success-text{color:#15803d;font-size:13px;margin-top:.5rem}

.tournament-item{display:flex;justify-content:space-between;align-items:center;padding:.75rem 0;border-bottom:1px solid #f0ede6}
.tournament-item:last-child{border-bottom:none}
.t-name{font-size:14px;font-weight:500}
.t-date{font-size:12px;color:#888}
.active-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ade80;margin-right:5px}

@media(max-width:480px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .team-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-title">🥋 관리자 로그인</div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="loginPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-primary" onclick="doLogin()">로그인</button>
      <div id="loginError" class="error-text" style="text-align:center;display:none"></div>
    </div>
  </div>
</div>

<!-- 메인 관리자 화면 -->
<div id="adminScreen" style="display:none">
  <div class="topbar">
    <div class="topbar-title">완산제검도관 · 관리자</div>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="container">

    <!-- 탭 -->
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('status',this)">신청 현황</button>
      <button class="tab" onclick="switchTab('team',this)">팀 편성</button>
      <button class="tab" onclick="switchTab('setup',this)">대회 세팅</button>
    </div>

    <!-- 신청 현황 탭 -->
    <div id="tab-status">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num" id="st-total">0</div><div class="stat-lbl">전체 신청</div></div>
        <div class="stat-card"><div class="stat-num" id="st-ind">0</div><div class="stat-lbl">개인전</div></div>
        <div class="stat-card"><div class="stat-num" id="st-team">0</div><div class="stat-lbl">단체전</div></div>
        <div class="stat-card"><div class="stat-num" id="st-fee">0</div><div class="stat-lbl">총 참가비(원)</div></div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <div class="section-label" style="margin:0">신청자 목록</div>
          <div style="display:flex;gap:.5rem">
            <button class="btn-outline" onclick="loadRegistrations()">새로고침</button>
            <button class="btn-sm" onclick="exportCSV()">CSV 다운로드</button>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead>
              <tr>
                <th>이름</th><th>단/급</th><th>생년월일</th><th>연락처</th><th>종목</th><th>참가비</th><th>신청일</th><th></th>
              </tr>
            </thead>
            <tbody id="regTable">
              <tr><td colspan="8" style="text-align:center;color:#aaa;padding:2rem">신청자가 없습니다</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 팀 편성 탭 -->
    <div id="tab-team" style="display:none">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <div>
            <span class="section-label" style="margin:0;display:inline">팀 구성 제안</span>
            <span class="ai-badge">✦ AI 제안</span>
          </div>
          <button class="btn-sm" onclick="getTeamSuggestion()">팀 편성 제안받기</button>
        </div>
        <div id="teamResult">
          <div style="text-align:center;color:#aaa;font-size:13px;padding:2rem">
            '팀 편성 제안받기' 버튼을 눌러주세요
          </div>
        </div>
        <div id="teamReason" style="display:none;margin-top:1rem;background:#f5f4f0;border-radius:10px;padding:1rem;font-size:13px;color:#555;line-height:1.7"></div>
      </div>
    </div>

    <!-- 대회 세팅 탭 -->
    <div id="tab-setup" style="display:none">
      <div class="card">
        <div class="section-label">대회 요강 PDF로 자동 세팅</div>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('pdfFile').click()">
          <div style="font-size:24px;margin-bottom:8px">📄</div>
          <div>PDF 파일을 클릭해서 선택하세요</div>
          <div style="font-size:11px;margin-top:4px">대회명, 날짜, 장소, 참가비, 주의사항이 자동으로 입력됩니다</div>
        </div>
        <input type="file" id="pdfFile" accept=".pdf" style="display:none" multiple onchange="handlePDF(this)">
        <div class="parsed-result" id="parsedResult"></div>
      </div>

      <div class="card">
        <div class="section-label">대회 정보 직접 입력</div>
        <div class="field"><label>대회명 *</label><input type="text" id="t-name" placeholder="2024 전북 도지사배 검도대회"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
          <div class="field"><label>개최일</label><input type="date" id="t-date"></div>
          <div class="field"><label>접수 마감</label><input type="date" id="t-deadline"></div>
        </div>
        <div class="field"><label>장소</label><input type="text" id="t-place" placeholder="전주실내체육관"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
          <div class="field"><label>개인전 참가비 (원)</label><input type="number" id="t-fee-ind" placeholder="30000"></div>
          <div class="field"><label>단체전 참가비 (원)</label><input type="number" id="t-fee-team" placeholder="20000"></div>
        </div>
        <div class="field"><label>주의사항 (줄바꿈으로 구분)</label><textarea id="t-notices" placeholder="참가 마감 후 환불 불가&#10;사복 착용 금지&#10;보호대 필수 착용"></textarea></div>
        <button class="btn-primary" onclick="saveTournament()">저장하고 신청 받기 시작</button>
        <div id="saveMsg" style="display:none"></div>
      </div>

      <div class="card">
        <div class="section-label">대회 목록</div>
        <div id="tournamentList"><div style="text-align:center;color:#aaa;font-size:13px;padding:1.5rem">불러오는 중...</div></div>
      </div>
    </div>

  </div>
</div>

<script>
const ANTHROPIC_URL = 'https://api.anthropic.com/v1/messages';
let ANTHROPIC_KEY = '';
fetch('/api/config').then(r=>r.json()).then(d=>{ANTHROPIC_KEY=d.apiKey});
let currentTournament = null;
let registrations = [];

const EVENT_LABELS = { individual:'개인전', team:'단체전', both:'개인전+단체전' };

// ── 인증 ─────────────────────────────────────────────────

async function checkAuth() {
  const res = await fetch('/api/admin/check');
  const data = await res.json();
  if (data.ok) showAdmin();
}

async function doLogin() {
  const pw = document.getElementById('loginPw').value;
  const res = await fetch('/api/admin/login', {
    method:'POST', headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body: JSON.stringify({password:pw})
  });
  const data = await res.json();
  if (data.ok) {
    showAdmin();
  } else {
    const el = document.getElementById('loginError');
    el.textContent = data.error;
    el.style.display = 'block';
  }
}

async function doLogout() {
  await fetch('/api/admin/logout', {method:'POST'});
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
}

function showAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'block';
  loadActiveTournament();
  loadTournamentList();
}

// ── 탭 ───────────────────────────────────────────────────

function switchTab(tab, el) {
  ['status','team','setup'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'status' && currentTournament) loadRegistrations();
}

// ── 대회 ──────────────────────────────────────────────────

async function loadActiveTournament() {
  const res = await fetch('/api/tournaments/active');
  const data = await res.json();
  currentTournament = data;
  if (data) loadRegistrations();
}

async function loadTournamentList() {
  const res = await fetch('/api/tournaments');
  const list = await res.json();
  const el = document.getElementById('tournamentList');
  if (!list.length) { el.innerHTML = '<div style="text-align:center;color:#aaa;font-size:13px;padding:1.5rem">등록된 대회가 없습니다</div>'; return; }
  el.innerHTML = list.map(t => `
    <div class="tournament-item">
      <div>
        <div class="t-name">${t.active ? '<span class="active-dot"></span>' : ''}${t.name}</div>
        <div class="t-date">${t.date || '-'} · ${t.place || '-'}</div>
      </div>
      ${!t.active ? `<button class="btn-outline" onclick="activateTournament(${t.id})">활성화</button>` : '<span style="font-size:12px;color:#15803d;font-weight:500">신청 중</span>'}
    </div>`).join('');
}

async function activateTournament(id) {
  await fetch(`/api/tournaments/${id}/activate`, {method:'POST'});
  await loadActiveTournament();
  loadTournamentList();
}

async function saveTournament() {
  const name = document.getElementById('t-name').value.trim();
  if (!name) { alert('대회명을 입력해주세요'); return; }
  const noticeRaw = document.getElementById('t-notices').value;
  const notices = noticeRaw ? noticeRaw.split('\n').map(s=>s.trim()).filter(Boolean) : [];

  const payload = {
    name,
    date: document.getElementById('t-date').value,
    deadline: document.getElementById('t-deadline').value,
    place: document.getElementById('t-place').value.trim(),
    fee_individual: parseInt(document.getElementById('t-fee-ind').value)||0,
    fee_team: parseInt(document.getElementById('t-fee-team').value)||0,
    notices
  };

  const res = await fetch('/api/tournaments', {
    method:'POST', headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  const msg = document.getElementById('saveMsg');
  if (data.ok) {
    msg.className = 'success-text'; msg.textContent = '✓ 저장되었습니다. 참가자에게 링크를 공유하세요!';
    msg.style.display = 'block';
    await loadActiveTournament();
    loadTournamentList();
  } else {
    msg.className = 'error-text'; msg.textContent = '저장 실패: ' + (data.error||'');
    msg.style.display = 'block';
  }
}

// ── PDF 파싱 ──────────────────────────────────────────────

async function handlePDF(input) {
  const file = input.files[0];
  if (!file) return;
  const zone = document.getElementById('uploadZone');
  zone.innerHTML = `<div style="font-size:24px;margin-bottom:8px">⏳</div><div>PDF 분석 중...</div>`;

  const base64 = await new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('읽기 실패'));
    r.readAsDataURL(file);
  });

  try {
    const resp = await fetch(ANTHROPIC_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:'검도 대회 요강 PDF에서 정보를 추출해. 반드시 JSON만 반환, 다른 텍스트나 마크다운 없이. 형식: {"name":"대회명","date":"YYYY-MM-DD","place":"장소","fee_individual":개인전참가비숫자,"fee_team":단체전참가비숫자,"deadline":"YYYY-MM-DD","notices":["주의사항1","주의사항2"]}. 날짜는 YYYY-MM-DD 형식. 참가비 없으면 0. 주의사항 없으면 [].',
        messages:[{role:'user',content:[
          {type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}},
          {type:'text',text:'대회 요강 정보를 추출해줘.'}
        ]}]
      })
    });
    const resData = await resp.json();
    const text = resData.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);

    // 폼에 자동 입력
    document.getElementById('t-name').value = parsed.name || '';
    document.getElementById('t-date').value = parsed.date || '';
    document.getElementById('t-deadline').value = parsed.deadline || '';
    document.getElementById('t-place').value = parsed.place || '';
    document.getElementById('t-fee-ind').value = parsed.fee_individual || '';
    document.getElementById('t-fee-team').value = parsed.fee_team || '';
    document.getElementById('t-notices').value = (parsed.notices||[]).join('\n');

    document.getElementById('parsedResult').style.display = 'block';
    document.getElementById('parsedResult').innerHTML = `
      <div class="parsed-row"><span class="parsed-key">대회명</span><span class="parsed-val">${parsed.name||'-'}</span></div>
      <div class="parsed-row"><span class="parsed-key">개최일</span><span class="parsed-val">${parsed.date||'-'}</span></div>
      <div class="parsed-row"><span class="parsed-key">장소</span><span class="parsed-val">${parsed.place||'-'}</span></div>
      <div class="parsed-row"><span class="parsed-key">개인전 참가비</span><span class="parsed-val">${parsed.fee_individual?parsed.fee_individual.toLocaleString()+'원':'-'}</span></div>
      <div class="parsed-row"><span class="parsed-key">단체전 참가비</span><span class="parsed-val">${parsed.fee_team?parsed.fee_team.toLocaleString()+'원':'-'}</span></div>
      <div class="parsed-row"><span class="parsed-key">접수 마감</span><span class="parsed-val">${parsed.deadline||'-'}</span></div>
    `;
    zone.classList.add('has-file');
    zone.innerHTML = `<div style="font-size:20px;margin-bottom:4px">✓</div><div style="font-weight:500">${file.name}</div><div style="font-size:11px;margin-top:2px">분석 완료 · 아래 내용을 확인 후 저장하세요</div>`;
  } catch(e) {
    zone.innerHTML = `<div style="font-size:24px;margin-bottom:8px">📄</div><div>분석 실패 - 다시 시도해주세요</div>`;
    console.error(e);
  }
}

// ── 신청 현황 ──────────────────────────────────────────────

async function loadRegistrations() {
  if (!currentTournament) return;
  const res = await fetch(`/api/registrations/${currentTournament.id}`);
  if (!res.ok) return;
  registrations = await res.json();
  renderRegistrations();
  renderStats();
}

function renderStats() {
  const total = registrations.length;
  const ind = registrations.filter(r=>r.event_type==='individual'||r.event_type==='both').length;
  const team = registrations.filter(r=>r.event_type==='team'||r.event_type==='both').length;
  const fee = registrations.reduce((s,r)=>s+r.fee,0);
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-ind').textContent = ind;
  document.getElementById('st-team').textContent = team;
  document.getElementById('st-fee').textContent = fee.toLocaleString();
}

function renderRegistrations() {
  const tbody = document.getElementById('regTable');
  if (!registrations.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#aaa;padding:2rem">신청자가 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = registrations.map(r => `
    <tr>
      <td style="font-weight:500">${r.name}</td>
      <td>${r.rank}</td>
      <td>${r.birth}</td>
      <td>${r.phone}</td>
      <td><span class="badge badge-${r.event_type}">${EVENT_LABELS[r.event_type]||r.event_type}</span></td>
      <td>${r.fee.toLocaleString()}원</td>
      <td style="color:#aaa;font-size:12px">${r.created_at ? r.created_at.slice(5,16) : '-'}</td>
      <td><button class="btn-danger" onclick="deleteReg(${r.id})">삭제</button></td>
    </tr>`).join('');
}

async function deleteReg(id) {
  if (!confirm('이 신청을 삭제할까요?')) return;
  await fetch(`/api/registrations/${id}`, {method:'DELETE'});
  loadRegistrations();
}

function exportCSV() {
  if (!currentTournament) return;
  window.location.href = `/api/registrations/${currentTournament.id}/export`;
}

// ── AI 팀 편성 제안 ───────────────────────────────────────

async function getTeamSuggestion() {
  const teamMembers = registrations.filter(r => r.event_type==='team'||r.event_type==='both');
  if (!teamMembers.length) { alert('단체전 신청자가 없습니다'); return; }

  document.getElementById('teamResult').innerHTML = '<div style="text-align:center;color:#aaa;font-size:13px;padding:2rem">AI가 팀을 구성하는 중...</div>';
  document.getElementById('teamReason').style.display = 'none';

  const memberInfo = teamMembers.map(m => `${m.name}(${m.rank}, ${m.birth.slice(0,4)}년생)`).join(', ');

  try {
    const resp = await fetch(ANTHROPIC_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:'검도 단체전 팀 편성을 도와주는 전문가야. 반드시 JSON만 반환하고, 다른 텍스트나 마크다운 없이. 형식: {"teams":[{"name":"팀 1","members":["이름(단급)","이름(단급)"]},...],"reason":"편성 이유 설명"}. 검도 단체전은 보통 5인 1팀. 단을 고려해서 균형있게 편성해.',
        messages:[{role:'user',content:`단체전 신청자: ${memberInfo}\n\n균형잡힌 팀 편성을 제안해줘.`}]
      })
    });
    const resData = await resp.json();
    const text = resData.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);

    document.getElementById('teamResult').innerHTML = `
      <div class="team-grid">
        ${parsed.teams.map((team,i) => `
          <div class="team-card">
            <div class="team-title">팀 ${i+1} · ${team.members.length}명</div>
            ${team.members.map((m,j) => {
              const initials = m.charAt(0);
              return `<div class="team-member">
                <div class="member-avatar">${initials}</div>
                <div>
                  <div class="member-name">${m.split('(')[0]}</div>
                  <div class="member-rank">${m.match(/\(([^)]+)\)/)?.[1]||''}</div>
                </div>
              </div>`;
            }).join('')}
          </div>`).join('')}
      </div>`;

    if (parsed.reason) {
      document.getElementById('teamReason').style.display = 'block';
      document.getElementById('teamReason').textContent = '💡 ' + parsed.reason;
    }
  } catch(e) {
    document.getElementById('teamResult').innerHTML = '<div style="text-align:center;color:#dc2626;font-size:13px;padding:1.5rem">팀 편성 실패 - 다시 시도해주세요</div>';
  }
}

checkAuth();
</script>
